<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUN ZONE - Premium Chat</title>
    
    <!-- 📱 PWA Manifest Link -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-black: #0A0A0A;
            --purple-glow: #7C3AED;
            --cyan-accent: #06B6D4;
            --text-white: #F9FAFB;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Premium Background Effects --- */
        .noise-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
            pointer-events: none; z-index: 1;
        }

        .spotlight {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none;
            background: radial-gradient(800px circle at var(--x) var(--y), rgba(255, 255, 255, 0.04), transparent 40%);
            z-index: 2;
        }

        .blob { 
            position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.4; z-index: 0; 
            animation: float 12s infinite alternate ease-in-out; 
            will-change: transform; 
        }
        .blob-purple { background: var(--purple-glow); width: 400px; height: 400px; top: 10%; left: 20%; }
        .blob-cyan { background: var(--cyan-accent); width: 350px; height: 350px; bottom: 10%; right: 20%; animation-duration: 15s; animation-direction: alternate-reverse; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* --- Navbar --- */
        nav {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%;
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--glass-border); z-index: 100;
        }
        .logo-container { display: flex; align-items: center; }
        .menu-toggle-btn {
            background: none; border: none; color: var(--text-white); font-size: 24px; cursor: pointer; display: none; margin-right: 18px; transition: color 0.25s;
        }
        .menu-toggle-btn:hover { color: var(--cyan-accent); }
        
        .logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: 2px; background: linear-gradient(to right, #fff, rgba(255,255,255,0.7)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links button, .user-greet { background: none; border: none; color: rgba(249, 250, 251, 0.7); font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.3s; }
        .nav-links button:hover { color: var(--text-white); }
        .user-greet { color: var(--cyan-accent); cursor: default; font-weight: 400; }
        .logout-btn { color: #ef4444 !important; }

        /* --- SLIDE NAVIGATION PROFILE DRAWER --- */
        .nav-drawer {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100vh;
            background: rgba(10, 10, 10, 0.85); border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 999; padding: 30px 20px; display: flex; flex-direction: column;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }
        .nav-drawer.active { left: 0; }
        .close-drawer-btn { align-self: flex-end; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 24px; cursor: pointer; transition: color 0.25s; margin-bottom: 25px; }
        .close-drawer-btn:hover { color: white; }

        .drawer-profile-section {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px 16px; text-align: center;
        }
        .drawer-avatar {
            width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--purple-glow), var(--cyan-accent));
            display: flex; justify-content: center; align-items: center; margin: 0 auto 16px; color: white; font-size: 26px; font-weight: 600; box-shadow: 0 0 25px rgba(6, 182, 212, 0.25);
        }
        .drawer-profile-section h4 { font-size: 11px; color: var(--cyan-accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }
        .drawer-username { font-family: 'Poppins', sans-serif; font-size: 17px; font-weight: 600; color: white; margin-bottom: 4px; }
        .drawer-email { font-size: 13px; color: rgba(255,255,255,0.4); word-break: break-all; }

        /* --- Main Hero Section (Logged Out State) --- */
        .hero-section {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 10;
            opacity: 1; transition: all 0.3s ease; will-change: transform, opacity;
        }
        .hero-section h2 { font-size: 16px; font-weight: 400; letter-spacing: 6px; color: rgba(249, 250, 251, 0.5); margin-bottom: 12px; }
        .hero-section h1 {
            font-family: 'Poppins', sans-serif; font-size: 6rem; font-weight: 800; letter-spacing: -3px;
            background: linear-gradient(135deg, #fff 30%, var(--cyan-accent) 70%, var(--purple-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; line-height: 1.1;
        }
        .hero-section p { font-size: 1.2rem; font-weight: 300; letter-spacing: 1px; color: rgba(249, 250, 251, 0.6); margin-bottom: 50px; }

        /* --- PREMIUM WELCOME DASHBOARD SCREEN --- */
        .welcome-dashboard {
            display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 10;
            opacity: 1; transition: all 0.4s ease;
        }
        .welcome-dashboard h2 { font-size: 14px; font-weight: 500; letter-spacing: 5px; color: var(--cyan-accent); margin-bottom: 12px; text-transform: uppercase; }
        .welcome-dashboard h1 {
            font-family: 'Poppins', sans-serif; font-size: 4.5rem; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, rgba(255,255,255,0.55)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; line-height: 1.1;
        }
        .welcome-dashboard p { font-size: 1.1rem; font-weight: 300; color: rgba(249, 250, 251, 0.5); margin-bottom: 45px; letter-spacing: 0.5px; }

        /* --- Buttons --- */
        .btn-container { display: flex; gap: 20px; align-items: center; justify-content: center; flex-wrap: wrap; position: relative; z-index: 25; }
        .btn { padding: 14px 36px; border-radius: 50px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; gap: 8px; border: none; will-change: transform; }
        
        .btn-login { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-white); backdrop-filter: blur(10px); }
        .btn-login:hover { background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.05); transform: translateY(-2px); }

        .btn-signup { background: linear-gradient(135deg, var(--purple-glow), var(--cyan-accent)); color: white; box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3); }
        .btn-signup:hover { box-shadow: 0 15px 40px rgba(6, 182, 212, 0.4); transform: translateY(-2px); }

        .btn-launch-chat {
            background: linear-gradient(135deg, var(--purple-glow), var(--cyan-accent)); color: white; padding: 16px 44px; font-size: 16px; font-weight: 600; border-radius: 50px;
            box-shadow: 0 10px 35px rgba(124, 58, 237, 0.3); animation: pulseGlow 2.5s infinite ease-in-out;
        }
        .btn-launch-chat:hover { transform: translateY(-3px); box-shadow: 0 15px 45px rgba(6, 182, 212, 0.5); }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3); }
            50% { box-shadow: 0 10px 40px rgba(6, 182, 212, 0.6); transform: scale(1.01); }
            100% { box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3); }
        }

        /* --- CHAT INTERFACE --- */
        .chat-dashboard {
            display: none;
            width: 92%; max-width: 1200px; height: 78vh; margin: 100px auto 20px;
            background: rgba(255, 255, 255, 0.01); border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 24px;
            z-index: 50; position: relative; overflow: hidden; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            animation: chatFadeIn 0.5s ease forwards;
        }
        .chat-container { display: flex; height: 100%; position: relative; }

        /* Left Panel - Sidebar */
        .chat-sidebar {
            width: 32%; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.2); transition: all 0.3s ease;
        }
        .search-area { padding: 24px 20px; border-bottom: 1px solid var(--glass-border); display: flex; gap: 10px; }
        .search-area input {
            width: 100%; flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 14px; color: white; outline: none; font-size: 14px; transition: all 0.3s;
        }
        .search-area input:focus { border-color: var(--cyan-accent); box-shadow: 0 0 15px rgba(6, 182, 212, 0.15); }
        .search-btn {
            padding: 12px 16px; background: linear-gradient(135deg, var(--purple-glow), var(--cyan-accent));
            border: none; border-radius: 14px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .recent-list-title { font-size: 12px; font-weight: 600; letter-spacing: 1px; color: rgba(255,255,255,0.3); padding: 15px 20px 5px; text-transform: uppercase; }
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .chat-user-item {
            display: flex; align-items: center; gap: 14px; padding: 14px; border-radius: 16px; cursor: pointer; transition: all 0.25s; margin-bottom: 6px; border: 1px solid transparent; position: relative;
        }
        .chat-user-item:hover { background: rgba(255, 255, 255, 0.03); }
        .chat-user-item.active { background: rgba(6, 182, 212, 0.06); border-color: rgba(6, 182, 212, 0.15); }
        
        .user-avatar-mock {
            width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            display: flex; justify-content: center; align-items: center; color: var(--cyan-accent); font-size: 20px; flex-shrink: 0; position: relative;
        }
        .chat-user-item.active .user-avatar-mock { color: #fff; background: var(--cyan-accent); }
        .user-meta { text-align: left; flex: 1; }
        .user-meta h4 { font-size: 14px; font-weight: 500; margin-bottom: 2px; color: #fff; text-align: left;}
        .user-meta p { font-size: 12px; color: rgba(255,255,255,0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }

        /* 🟢 REAL-TIME STATUS BADGE POINT INDICATORS */
        .status-dot-indicator {
            position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; border-radius: 50%;
            background: #9ca3af; border: 2px solid #0A0A0A; display: block;
        }
        .status-dot-indicator.online { background: #22c55e !important; box-shadow: 0 0 10px rgba(34,197,94,0.6); }

        /* 🔢 DYNAMIC CHAT BADGE PILL DESIGN */
        .unread-badge {
            background: linear-gradient(135deg, var(--cyan-accent), var(--purple-glow));
            color: white; font-size: 11px; font-weight: 600; min-width: 20px; height: 20px;
            border-radius: 50%; display: none; align-items: center; justify-content: center;
            padding: 0 5px; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); margin-left: auto;
        }

        /* Right Panel - Active Chat Screen */
        .chat-main-screen { width: 68%; display: flex; flex-direction: column; background: rgba(0,0,0,0.05); transition: all 0.3s ease;}
        .chat-screen-header {
            padding: 18px 24px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 14px;
            background: rgba(10, 10, 10, 0.4); backdrop-filter: blur(10px);
        }
        .active-user-info { text-align: left; }
        .active-user-info h3 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
        .active-user-info p { font-size: 12px; color: rgba(255,255,255,0.4); }
        .active-user-info p.status-highlight { color: var(--cyan-accent); font-weight: 500; }
        .active-user-info p.typing-highlight { color: #22c55e; font-weight: 600; animation: flashTyping 1.4s infinite ease-in-out; }

        @keyframes flashTyping { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        .mobile-back-btn {
            display: none; background: none; border: none; color: white; font-size: 22px; cursor: pointer; align-items: center; justify-content: center; margin-right: 5px;
        }

        .chat-messages-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 16px; }
        .no-chat-placeholder { margin: auto; color: rgba(249, 250, 251, 0.3); font-size: 15px; text-align: center; font-weight: 300; }
        
        /* Message Bubbles */
        .msg-bubble { max-width: 60%; padding: 14px 18px; border-radius: 20px; font-size: 14.5px; line-height: 1.45; position: relative; word-wrap: break-word; }
        .msg-bubble.sent {
            align-self: flex-end; background: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.25);
            color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 8px 24px rgba(124, 58, 237, 0.1);
        }
        .msg-bubble.received {
            align-self: flex-start; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.9); border-bottom-left-radius: 4px;
        }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 6px; text-align: right; display: block; }

        .chat-screen-footer {
            padding: 20px 24px; border-top: 1px solid var(--glass-border); display: flex; gap: 14px;
            background: rgba(10, 10, 10, 0.4); backdrop-filter: blur(10px); align-items: center;
        }
        .chat-screen-footer input {
            flex: 1; padding: 15px 24px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 30px; color: white; outline: none; font-size: 14px; transition: all 0.3s;
        }
        .chat-screen-footer input:focus { border-color: var(--purple-glow); background: rgba(255,255,255,0.05); }
        
        .send-msg-btn {
            height: 48px; width: 48px; background: linear-gradient(135deg, var(--purple-glow), var(--cyan-accent));
            border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: transform 0.2s, box-shadow 0.2s;
        }
        .send-msg-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }

        /* --- 📱 MOBILE VIEW OPTIMIZATION --- */
        @media (max-width: 768px) {
            .chat-dashboard { height: 80vh; margin: 90px auto 10px; width: 95%; }
            .chat-sidebar { width: 100% !important; border-right: none; display: flex !important; }
            .chat-main-screen { 
                position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
                z-index: 60; display: none !important; background: #0A0A0A;
            }
            #chatPlaceholderScreen { display: none !important; } 
            
            .chat-dashboard.mobile-active .chat-sidebar { display: none !important; }
            .chat-dashboard.mobile-active #chatMainScreen { display: flex !important; }
            .mobile-back-btn { display: flex; }
            .msg-bubble { max-width: 80%; }
            
            .welcome-dashboard h1 { font-size: 3rem; }
        }

        /* --- Auth Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .auth-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); transform: scale(0.95) translateY(10px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .auth-card { transform: scale(1) translateY(0); }

        .auth-card h3 { font-family: 'Poppins', sans-serif; font-size: 24px; margin-bottom: 10px; font-weight: 600; }
        .auth-card p { font-size: 14px; color: rgba(249, 250, 251, 0.5); margin-bottom: 25px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group input {
            width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; font-size: 14px; outline: none; transition: all 0.25s;
        }
        .input-group input:focus { border-color: var(--cyan-accent); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }

        .auth-submit { width: 100%; padding: 14px; border-radius: 12px; border: none; background: white; color: black; font-weight: 500; font-size: 15px; cursor: pointer; margin-top: 10px; transition: all 0.25s; }
        .auth-submit:hover { opacity: 0.9; transform: translateY(-1px); }

        .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; color: rgba(249, 250, 251, 0.4); cursor: pointer; font-size: 20px; transition: color 0.3s; }
        .close-modal:hover { color: white; }

        .divider { display: flex; align-items: center; text-align: center; color: rgba(249, 250, 251, 0.2); font-size: 12px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--glass-border); }
        .divider:not(:empty)::before { margin-right: .5em; } .divider:not(:empty)::after { margin-left: .5em; }

        .google-btn {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-bg);
            color: white; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; cursor: pointer; transition: all 0.25s;
        }
        .google-btn:hover { background: rgba(255,255,255,0.08); }

        /* 📱 APP KE ANDAR DOWNLOAD BUTTON KO CHUPANE KE LIYE */
        @media (display-mode: standalone) {
            #downloadApkBtn {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="spotlight" id="spotlight"></div>
    <div class="noise-bg"></div>
    <div class="blob blob-purple"></div>
    <div class="blob blob-cyan"></div>

    <!-- ☰ LEFT SLIDE OUT NAVIGATION SIDEBAR DRAWER -->
    <div class="nav-drawer" id="navDrawer">
        <button class="close-drawer-btn" onclick="toggleNavDrawer()" title="Close Profile Menu">
            <i class="ph ph-x"></i>
        </button>
        <div class="drawer-profile-section">
            <h4>Your Profile</h4>
            <div class="drawer-avatar" id="drawerAvatarIcon"><i class="ph ph-user"></i></div>
            <div class="drawer-username" id="drawerProfileName">---</div>
            <div class="drawer-email" id="drawerProfileEmail">---</div>
        </div>
    </div>

    <!-- Header Navbar Section -->
    <nav>
        <div class="logo-container">
            <button class="menu-toggle-btn" id="menuToggleBtn" onclick="toggleNavDrawer()" title="Open Profile Drawer">
                <i class="ph ph-list"></i>
            </button>
            <div class="logo">FUN ZONE</div>
        </div>
        <div class="nav-links" id="navAuthLinks">
            <button onclick="openModal('login')">Login</button>
            <button onclick="openModal('signup')">Sign Up</button>
        </div>
    </nav>

    <!-- Main Landing Hero View (Logged Out) -->
    <main class="hero-section" id="hero">
        <h2>WELCOME TO</h2>
        <h1>FUN ZONE</h1>
        <p>Simple. Modern. Premium.</p>

        <!-- 📱 UPDATED BUTTON CONTAINER WITH DOWNLOAD APK BUTTON -->
        <div class="btn-container" id="heroBtnContainer">
            <button class="btn btn-login" onclick="openModal('login')">Login</button>
            
            <!-- Premium Android Download Button -->
            <a href="./funzone.apk" download id="downloadApkBtn" class="btn" style="background: linear-gradient(135deg, #22C55E, #06B6D4); color: white; box-shadow: 0 10px 30px rgba(34, 197, 94, 0.35); text-decoration: none; font-weight: 600;">
                <i class="ph ph-android-logo" style="font-size: 22px;"></i> Download Android App
            </a>
        </div>
    </main>

    <!-- PREMIUM LOGGED IN WELCOME DASHBOARD SCREEN -->
    <section class="welcome-dashboard" id="welcomeDashboard">
        <h2>Dashboard</h2>
        <h1 id="welcomeUserGreeting">Hello, User!</h1>
        <p>Your premium custom zone is fully active and ready.</p>
        <button class="btn btn-launch-chat" onclick="launchChatInterface()">
            <i class="ph ph-chats-teardrop" style="font-size: 22px;"></i> Launch FUN CHAT
        </button>
    </section>

    <!-- REAL-TIME CHAT DASHBOARD PANEL -->
    <section class="chat-dashboard" id="chatDashboard">
        <div class="chat-container">
            
            <!-- LEFT AREA: Search and Recent Users List -->
            <div class="chat-sidebar">
                <div class="search-area">
                    <input type="email" placeholder="Enter Gmail ID..." id="userSearchInput">
                    <button class="search-btn" id="searchUserActionBtn" title="Search User">
                        <i class="ph ph-magnifying-glass" style="font-size: 18px;"></i>
                    </button>
                </div>
                
                <div class="recent-list-title">Conversations</div>
                <div class="chat-list" id="chatUsersList"></div>
            </div>

            <!-- RIGHT AREA: Active Conversational Box Window -->
            <div class="chat-main-screen" id="chatMainScreen" style="display: none;">
                <div class="chat-screen-header">
                    <button class="mobile-back-btn" onclick="exitMobileChat()" title="Back to list">
                        <i class="ph ph-arrow-left"></i>
                    </button>
                    <div class="user-avatar-mock" style="background: rgba(6, 182, 212, 0.15);"><i class="ph ph-user-circle"></i></div>
                    <div class="active-user-info">
                        <h3 id="activeChatName">---</h3>
                        <p id="activeChatEmail">---</p>
                    </div>
                </div>

                <div class="chat-messages-body" id="chatMessagesContainer"></div>

                <div class="chat-screen-header chat-screen-footer">
                    <input type="text" placeholder="Write a gorgeous message..." id="messageInputField">
                    <button class="send-msg-btn" id="sendMessageActionBtn" title="Send Message">
                        <i class="ph ph-paper-plane-right"></i>
                    </button>
                </div>
            </div>

            <!-- Blank Screen Initial State Placeholder Box -->
            <div class="chat-main-screen" id="chatPlaceholderScreen" style="display: flex;">
                <div class="no-chat-placeholder">
                    <i class="ph ph-chats-teardrop" style="font-size: 48px; color: rgba(255,255,255,0.1); margin-bottom: 12px; display:block;"></i>
                    Search a Gmail to start conversations
                </div>
            </div>

        </div>
    </section>

    <!-- Modal Form Windows -->
    <div class="modal-overlay" id="authModal" onclick="closeModal(event)">
        <div class="auth-card" onclick="event.stopPropagation()">
            <button class="close-modal" id="closeModalBtn">
                <i class="ph ph-x"></i>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- 🔥 FIREBASE & FIRESTORE REAL-TIME DATABASE ENGINE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
            updateProfile, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        import { 
            getFirestore, doc, setDoc, getDocs, collection, query, where, 
            addDoc, serverTimestamp, orderBy, onSnapshot, increment 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCJ75TKwCbpR-7Z0PUue-q1_NjgTaJ7Zro",
          authDomain: "my-website-c5665.firebaseapp.com",
          projectId: "my-website-c5665",
          storageBucket: "my-website-c5665.firebasestorage.app",
          messagingSenderId: "729016953744",
          appId: "1:729016953744:web:5b93b0bc3541c4d9102115"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        const modal = document.getElementById('authModal');
        const modalContent = document.getElementById('modalContent');
        const navAuthLinks = document.getElementById('navAuthLinks');
        const closeModalBtn = document.getElementById('closeModalBtn');

        let currentUser = null;
        let activeChatRoomId = null;
        let activeChatUserUid = null;
        let unsubscribeMessages = null;
        let unsubscribeRooms = null;
        let unsubscribeActiveUserStatus = null;
        let unsubscribeActiveRoomTyping = null;
        let typingTimeout = null;
        const localUnreadTracker = {}; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const displayName = user.displayName || "User";
                navAuthLinks.innerHTML = `
                    <span class="user-greet">Hi, ${displayName}</span>
                    <button class="logout-btn" id="logoutAction">Logout</button>
                `;
                
                document.getElementById('drawerProfileName').textContent = displayName;
                document.getElementById('drawerProfileEmail').textContent = user.email;
                document.getElementById('drawerAvatarIcon').textContent = displayName.charAt(0).toUpperCase();
                document.getElementById('menuToggleBtn').style.display = 'block';

                document.getElementById('hero').style.display = 'none';
                document.getElementById('chatDashboard').style.display = 'none';
                document.getElementById('welcomeDashboard').style.display = 'flex';
                document.getElementById('welcomeUserGreeting').textContent = `Hello, ${displayName}!`;

                document.getElementById('logoutAction')?.addEventListener('click', async () => {
                    if (currentUser) {
                        await setDoc(doc(db, "users", currentUser.uid), { status: "offline", lastSeen: serverTimestamp() }, { merge: true });
                    }
                    signOut(auth);
                    window.location.reload();
                });

                try {
                    // Update online lifecycle state seamlessly
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        name: displayName,
                        email: user.email.toLowerCase().trim(),
                        status: "online",
                        lastSeen: serverTimestamp()
                    }, { merge: true });

                    setupUserPresenceLifecycle();
                    listenToRegisteredUsersRealtime();
                    listenToGlobalRoomsUnread(); 
                } catch (error) {
                    console.error("Firestore Sync Fail: ", error);
                }
            } else {
                currentUser = null;
                if(unsubscribeRooms) unsubscribeRooms();
                navAuthLinks.innerHTML = `
                    <button id="navLoginBtn">Login</button>
                    <button id="navSignupBtn">Sign Up</button>
                `;
                document.getElementById('navLoginBtn')?.addEventListener('click', () => openModal('login'));
                document.getElementById('navSignupBtn')?.addEventListener('click', () => openModal('signup'));
                
                document.getElementById('menuToggleBtn').style.display = 'none';
                document.getElementById('navDrawer').classList.remove('active');
                document.getElementById('hero').style.display = 'flex';
                document.getElementById('chatDashboard').style.display = 'none';
                document.getElementById('welcomeDashboard').style.display = 'none';
            }
        });

        // 🟢 PRESETS FOR APP USER ONLINE STATUS & SYSTEM LIFECYCLE PRESENCE
        function setupUserPresenceLifecycle() {
            document.addEventListener('visibilitychange', () => {
                if (!currentUser) return;
                const statusStr = document.visibilityState === 'visible' ? "online" : "offline";
                setDoc(doc(db, "users", currentUser.uid), {
                    status: statusStr,
                    lastSeen: serverTimestamp()
                }, { merge: true });
            });
        }

        function listenToGlobalRoomsUnread() {
            if(unsubscribeRooms) unsubscribeRooms();

            unsubscribeRooms = onSnapshot(collection(db, "rooms"), (snapshot) => {
                snapshot.forEach((roomDoc) => {
                    const roomId = roomDoc.id;
                    const roomData = roomDoc.data();

                    if (roomId.includes(currentUser.uid)) {
                        const uids = roomId.split('_');
                        const otherUid = uids[0] === currentUser.uid ? uids[1] : uids[0];
                        
                        const myUnreadKey = `unread_${currentUser.uid}`;
                        const unreadCount = roomData[myUnreadKey] || 0;

                        const badgeEl = document.getElementById(`badge-${otherUid}`);
                        if(badgeEl) {
                            if(unreadCount > 0) {
                                badgeEl.textContent = unreadCount;
                                badgeEl.style.display = 'flex';
                            } else {
                                badgeEl.style.display = 'none';
                            }
                        }

                        const previousCount = localUnreadTracker[roomId] || 0;
                        if (roomData.lastSender !== currentUser.uid && unreadCount > previousCount) {
                            playNotificationChime();
                        }
                        localUnreadTracker[roomId] = unreadCount;
                    }
                });
            });
        }

        function playNotificationChime() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                gain1.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.start(); osc1.stop(audioCtx.currentTime + 0.35);
                
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(880.00, audioCtx.currentTime); 
                    gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.start(); osc2.stop(audioCtx.currentTime + 0.35);
                }, 75);
            } catch (e) {
                console.log("Audio block handled: ", e);
            }
        }

        // Helper to cleanly parse last seen text descriptions
        function formatLastSeenText(userData) {
            if (userData.status === 'online') return 'Online';
            if (!userData.lastSeen) return 'Offline';
            try {
                const d = userData.lastSeen.toDate();
                return `Last seen at ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            } catch(e) {
                return 'Offline';
            }
        }

        // 🔄 LISTEN TO ALL REGISTERED USERS LIST IN REAL-TIME (Online states sync instantly)
        function listenToRegisteredUsersRealtime() {
            const usersListContainer = document.getElementById('chatUsersList');
            onSnapshot(collection(db, "users"), (querySnapshot) => {
                // Keep selected element tracking safe
                const activeId = activeChatUserUid;
                usersListContainer.innerHTML = '';
                
                querySnapshot.forEach((docSnap) => {
                    const userData = docSnap.data();
                    if(userData.uid !== currentUser.uid) { 
                        const isOnline = userData.status === 'online';
                        const statusLabelText = formatLastSeenText(userData);

                        const userElement = document.createElement('div');
                        userElement.className = `chat-user-item ${activeId === userData.uid ? 'active' : ''}`;
                        userElement.id = `user-item-${userData.uid}`;
                        userElement.innerHTML = `
                            <div class="user-avatar-mock">
                                <i class="ph ph-user"></i>
                                <div class="status-dot-indicator ${isOnline ? 'online' : ''}"></div>
                            </div>
                            <div class="user-meta">
                                <h4>${userData.name}</h4>
                                <p>${statusLabelText}</p>
                            </div>
                            <div class="unread-badge" id="badge-${userData.uid}">0</div>
                        `;
                        userElement.addEventListener('click', () => initiateChatConnection(userData));
                        usersListContainer.appendChild(userElement);
                    }
                });
            });
        }

        document.getElementById('searchUserActionBtn').addEventListener('click', async () => {
            const searchInput = document.getElementById('userSearchInput').value.trim().toLowerCase();
            if(!searchInput) return;

            try {
                const q = query(collection(db, "users"), where("email", "==", searchInput));
                const querySnapshot = await getDocs(q);

                if(!querySnapshot.empty) {
                    const targetUser = querySnapshot.docs[0].data();
                    if(targetUser.uid === currentUser.uid) { alert("You cannot search yourself!"); return; }
                    initiateChatConnection(targetUser);
                } else {
                    alert("No user found with this Gmail ID!");
                }
            } catch (err) {
                console.error(err);
            }
        });

        async function initiateChatConnection(targetUser) {
            document.querySelectorAll('.chat-user-item').forEach(el => el.classList.remove('active'));
            const targetListItem = document.getElementById(`user-item-${targetUser.uid}`);
            if(targetListItem) targetListItem.classList.add('active');

            activeChatUserUid = targetUser.uid;
            activeChatRoomId = currentUser.uid < targetUser.uid ? `${currentUser.uid}_${targetUser.uid}` : `${targetUser.uid}_${currentUser.uid}`;

            document.getElementById('activeChatName').textContent = targetUser.name;

            document.getElementById('chatPlaceholderScreen').style.display = 'none';
            document.getElementById('chatMainScreen').style.display = 'flex';
            document.getElementById('chatDashboard').classList.add('mobile-active');

            try {
                await setDoc(doc(db, "rooms", activeChatRoomId), {
                    [`unread_${currentUser.uid}`]: 0
                }, { merge: true });
            } catch(e) { console.error(e); }

            // ✍️ Dynamic real-time listening parameters for Online status & typing hooks
            setupHeaderStatusRealtimeSync(targetUser.uid, activeChatRoomId);
            listenToRealtimeMessages(activeChatRoomId);
        }

        // 🟢 REAL-TIME WORKER TO MERGE ONLINE STATE AND TYPING STATUS INDICATORS IN CHAT HEADER
        function setupHeaderStatusRealtimeSync(targetUserUid, roomId) {
            if(unsubscribeActiveUserStatus) unsubscribeActiveUserStatus();
            if(unsubscribeActiveRoomTyping) unsubscribeActiveRoomTyping();

            const statusHeaderSubtext = document.getElementById('activeChatEmail');

            // 1. Listen to typing states
            unsubscribeActiveRoomTyping = onSnapshot(doc(db, "rooms", roomId), (roomDoc) => {
                const roomData = roomDoc.data();
                const isTyping = roomData ? roomData[`typing_${targetUserUid}`] === true : false;

                if (isTyping) {
                    statusHeaderSubtext.textContent = "typing...";
                    statusHeaderSubtext.className = "typing-highlight";
                } else {
                    // Fallback back to standard base status check snapshot tracking
                    statusHeaderSubtext.className = "";
                    fetchAndRenderStaticHeaderStatus(targetUserUid);
                }
            });

            // 2. Listen to user status snapshot updates
            unsubscribeActiveUserStatus = onSnapshot(doc(db, "users", targetUserUid), (userDoc) => {
                if (statusHeaderSubtext.className !== "typing-highlight") {
                    const userData = userDoc.data();
                    if (userData) {
                        statusHeaderSubtext.textContent = formatLastSeenText(userData);
                        if (userData.status === 'online') statusHeaderSubtext.classList.add('status-highlight');
                        else statusHeaderSubtext.classList.remove('status-highlight');
                    }
                }
            });
        }

        async function fetchAndRenderStaticHeaderStatus(targetUserUid) {
            const statusHeaderSubtext = document.getElementById('activeChatEmail');
            if (statusHeaderSubtext.className === "typing-highlight") return;
            const snap = await getDocs(query(collection(db, "users"), where("uid", "==", targetUserUid)));
            if(!snap.empty) {
                const userData = snap.docs[0].data();
                statusHeaderSubtext.textContent = formatLastSeenText(userData);
                if (userData.status === 'online') statusHeaderSubtext.className = "status-highlight";
            }
        }

        function listenToRealtimeMessages(roomId) {
            if (unsubscribeMessages) unsubscribeMessages(); 

            const msgContainer = document.getElementById('chatMessagesContainer');
            const q = query(collection(db, "chats", roomId, "messages"), orderBy("timestamp", "asc"));

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                msgContainer.innerHTML = '';
                if(snapshot.empty) {
                    msgContainer.innerHTML = `<div class="no-chat-placeholder">Type a message below to start chatting...</div>`;
                    return;
                }
                
                snapshot.forEach((docSnap) => {
                    const msgData = docSnap.data();
                    const isSentByMe = msgData.senderId === currentUser.uid;
                    
                    const dateObj = msgData.timestamp ? msgData.timestamp.toDate() : new Date();
                    const formattedTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    const msgBubble = document.createElement('div');
                    msgBubble.className = `msg-bubble ${isSentByMe ? 'sent' : 'received'}`;
                    msgBubble.innerHTML = `${msgData.text} <span class="msg-time">${formattedTime}</span>`;
                    msgContainer.appendChild(msgBubble);
                });
                msgContainer.scrollTop = msgContainer.scrollHeight;

                if(activeChatRoomId === roomId) {
                    setDoc(doc(db, "rooms", roomId), { [`unread_${currentUser.uid}`]: 0 }, { merge: true });
                }
            });
        }

        // ✍️ TYPING PIPELINE HOOKS CAPTURE DETECTOR
        document.getElementById('messageInputField').addEventListener('input', () => {
            if (!currentUser || !activeChatRoomId) return;

            // Trigger typing state to database instantly
            setDoc(doc(db, "rooms", activeChatRoomId), {
                [`typing_${currentUser.uid}`]: true
            }, { merge: true });

            // Debounce mechanism resetter
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                setDoc(doc(db, "rooms", activeChatRoomId), {
                    [`typing_${currentUser.uid}`]: false
                }, { merge: true });
            }, 1800); // Stop flag resets smoothly after 1.8 seconds of complete stillness
        });

        async function sendChatMessage() {
            const msgInput = document.getElementById('messageInputField');
            const textMsg = msgInput.value.trim();
            if(!textMsg || !activeChatRoomId) return;

            msgInput.value = ''; 
            
            // Clear current input typing hooks manually right when message shoots out
            clearTimeout(typingTimeout);
            setDoc(doc(db, "rooms", activeChatRoomId), { [`typing_${currentUser.uid}`]: false }, { merge: true });

            try {
                await addDoc(collection(db, "chats", activeChatRoomId, "messages"), {
                    text: textMsg,
                    senderId: currentUser.uid,
                    timestamp: serverTimestamp()
                });

                await setDoc(doc(db, "rooms", activeChatRoomId), {
                    [`unread_${activeChatUserUid}`]: increment(1),
                    lastSender: currentUser.uid,
                    timestamp: serverTimestamp()
                }, { merge: true });

            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('sendMessageActionBtn').addEventListener('click', sendChatMessage);
        document.getElementById('messageInputField').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });

        window.exitMobileChat = function() {
            document.getElementById('chatDashboard').classList.remove('mobile-active');
        }

        window.toggleNavDrawer = function() {
            document.getElementById('navDrawer').classList.toggle('active');
        }

        window.navigatorChatLaunch = function() {
            document.getElementById('welcomeDashboard').style.display = 'none';
            document.getElementById('chatDashboard').style.display = 'block';
        }
        window.launchChatInterface = window.navigatorChatLaunch; 

        window.openModal = function(type) {
            if(type === 'login') {
                modalContent.innerHTML = `
                    <h3>Welcome Back</h3>
                    <p>Enter your details to access your account.</p>
                    <div class="input-group"><input type="email" id="loginEmail" placeholder="Email Address" required></div>
                    <div class="input-group"><input type="password" id="loginPassword" placeholder="Password" required></div>
                    <button class="auth-submit" id="loginSubmitBtn">Sign In</button>
                    <div class="divider">or</div>
                    <button class="google-btn" id="googleAuthBtn"><i class="ph ph-google-logo" style="font-size:18px;"></i> Continue with Google</button>
                `;
                document.getElementById('loginSubmitBtn').addEventListener('click', handleEmailLogin);
            } else {
                modalContent.innerHTML = `
                    <h3>Create Account</h3>
                    <p>Get started with your premium profile today.</p>
                    <div class="input-group"><input type="text" id="signName" placeholder="Full Name" required></div>
                    <div class="input-group"><input type="email" id="signEmail" placeholder="Email Address" required></div>
                    <div class="input-group"><input type="password" id="signPassword" placeholder="Password" required></div>
                    <button class="auth-submit" id="signupSubmitBtn" style="background: linear-gradient(135deg, var(--purple-glow), var(--cyan-accent)); color: white;">Create Account</button>
                    <div class="divider">or</div>
                    <button class="google-btn" id="googleAuthBtn"><i class="ph ph-google-logo" style="font-size:18px;"></i> Sign up with Google</button>
                `;
                document.getElementById('signupSubmitBtn').addEventListener('click', handleEmailSignup);
            }
            document.getElementById('googleAuthBtn').addEventListener('click', handleGoogleAuth);
            modal.classList.add('active');
        }

        async function handleEmailSignup() {
            const name = document.getElementById('signName').value;
            const email = document.getElementById('signEmail').value.toLowerCase().trim();
            const password = document.getElementById('signPassword').value;
            if(!name || !email || !password) { alert("Please fill all fields!"); return; }
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                modal.classList.remove('active');
            } catch (error) { alert("Signup Error: " + error.message); }
        }

        async function handleEmailLogin() {
            const email = document.getElementById('loginEmail').value.toLowerCase().trim();
            const password = document.getElementById('loginPassword').value;
            if(!email || !password) { alert("Please fill all fields!"); return; }
            try { await signInWithEmailAndPassword(auth, email, password); modal.classList.remove('active'); } catch (error) { alert("Login Error: " + error.message); }
        }

        async function handleGoogleAuth() {
            try { await signInWithPopup(auth, googleProvider); modal.classList.remove('active'); } catch (error) { alert("Google Auth Error: " + error.message); }
        }

        closeModalBtn.addEventListener('click', () => modal.classList.remove('active'));
        
        // 🚀 AUTOMATIC PWA SERVICE WORKER REGISTRATION BOOTSTRAP PIPELINE
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('FUN ZONE PWA Service Worker Registered Setup Live'))
                    .catch(err => console.error('PWA Service Worker Registration Failed: ', err));
            });
        }
    </script>

    <script>
        const spotlight = document.getElementById('spotlight');
        document.addEventListener('mousemove', (e) => {
            spotlight.style.setProperty('--x', e.clientX + 'px');
            spotlight.style.setProperty('--y', e.clientY + 'px');
        });
        window.closeModal = function(e) { if(e.target === document.getElementById('authModal')) authModal.classList.remove('active'); }
    </script>
