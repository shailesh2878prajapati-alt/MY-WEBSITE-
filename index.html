<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY WEBSITE - Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght=600;800&family=Playfair+Display:ital,wght=1,500&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-black: #0A0A0A;
            --navy-blue: #111827;
            --purple-glow: #7C3AED;
            --cyan-accent: #06B6D4;
            --text-white: #F9FAFB;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --insta-neon: #E1306C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Premium Background Effects --- */
        .noise-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
            pointer-events: none; z-index: 1;
        }

        .spotlight {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none;
            background: radial-gradient(800px circle at var(--x) var(--y), rgba(255, 255, 255, 0.04), transparent 40%);
            z-index: 2;
        }

        .blob { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.4; z-index: 0; animation: float 12s infinite alternate ease-in-out; }
        .blob-purple { background: var(--purple-glow); width: 400px; height: 400px; top: 10%; left: 20%; }
        .blob-cyan { background: var(--cyan-accent); width: 350px; height: 350px; bottom: 10%; right: 20%; animation-duration: 15s; animation-direction: alternate-reverse; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* --- Navbar --- */
        nav {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%;
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--glass-border); z-index: 100;
        }
        .logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links button, .user-greet { background: none; border: none; color: rgba(249, 250, 251, 0.7); font-size: 14px; font-weight: 500; cursor: pointer; transition: color 0.3s; }
        .nav-links button:hover { color: var(--text-white); }
        .user-greet { color: var(--cyan-accent); cursor: default; font-weight: 400; }
        .logout-btn { color: #ef4444 !important; }

        /* --- Main Hero Section --- */
        .hero-section {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 10;
            opacity: 0; animation: fadeIn 1.5s forwards 0.5s; transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 1s ease;
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(20px); } }

        .hero-section h2 { font-size: 18px; font-weight: 400; letter-spacing: 4px; color: rgba(249, 250, 251, 0.6); margin-bottom: 10px; }
        .hero-section h1 {
            font-family: 'Poppins', sans-serif; font-size: 5rem; font-weight: 800; letter-spacing: -2px;
            background: linear-gradient(to right, var(--purple-glow), var(--cyan-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; line-height: 1.1;
        }
        .hero-section p { font-size: 1.2rem; color: rgba(249, 250, 251, 0.7); margin-bottom: 50px; }

        /* --- Buttons --- */
        .btn-container { display: flex; gap: 20px; align-items: center; justify-content: center; flex-wrap: wrap; position: relative; z-index: 25 !important; }
        .btn { padding: 12px 28px; border-radius: 50px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; border: none; }
        
        .btn-login { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-white); backdrop-filter: blur(10px); position: relative; z-index: 30; }
        .btn-login:hover { background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

        .btn-signup { background: linear-gradient(135deg, var(--purple-glow), var(--cyan-accent)); color: white; box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3); position: relative; z-index: 30; }
        .btn-signup:hover { box-shadow: 0 15px 40px rgba(6, 182, 212, 0.5); transform: translateY(-2px); }

        .btn-explore { 
            background: rgba(6, 182, 212, 0.04); 
            border: 2px solid rgba(6, 182, 212, 0.4); 
            color: #fff; 
            padding: 14px 40px; 
            font-size: 17px; 
            font-weight: 600; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.1);
            position: relative; z-index: 30;
        }
        .btn-explore:hover { 
            background: rgba(6, 182, 212, 0.1); 
            border-color: var(--cyan-accent); 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3); 
        }

        .btn-photos { background: transparent; border: 1px solid rgba(255, 255, 255, 0.3); color: var(--text-white); position: relative; z-index: 30; }
        .btn-photos:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--text-white); transform: translateY(-2px); }

        /* --- Photos Gallery Section --- */
        .photos-section { display: none; padding: 120px 5% 50px; position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; z-index: 10; animation: fadeIn 0.8s forwards; }
        .back-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-bottom: 30px; display: inline-flex; align-items: center; gap: 5px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.1); }
        .gallery-grid { column-count: 3; column-gap: 20px; }
        .gallery-item { break-inside: avoid; margin-bottom: 20px; border-radius: 16px; overflow: hidden; background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(10px); padding: 10px; transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .gallery-item img { width: 100%; border-radius: 10px; display: block; transition: transform 0.4s ease; }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: rgba(255, 255, 255, 0.2); }
        .gallery-item:hover img { transform: scale(1.03); }

        /* --- Auth Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .auth-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); transform: scale(0.9) translateY(20px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .auth-card { transform: scale(1) translateY(0); }

        .auth-card h3 { font-family: 'Poppins', sans-serif; font-size: 24px; margin-bottom: 10px; font-weight: 600; }
        .auth-card p { font-size: 14px; color: rgba(249, 250, 251, 0.5); margin-bottom: 25px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group input {
            width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; font-size: 14px; outline: none; transition: all 0.3s;
        }
        .input-group input:focus { border-color: var(--cyan-accent); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }

        .auth-submit { width: 100%; padding: 14px; border-radius: 12px; border: none; background: white; color: black; font-weight: 500; font-size: 15px; cursor: pointer; margin-top: 10px; transition: all 0.3s; }
        .auth-submit:hover { opacity: 0.9; transform: translateY(-1px); }

        .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; color: rgba(249, 250, 251, 0.4); cursor: pointer; font-size: 20px; transition: color 0.3s; }
        .close-modal:hover { color: white; }

        .divider { display: flex; align-items: center; text-align: center; color: rgba(249, 250, 251, 0.2); font-size: 12px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--glass-border); }
        .divider:not(:empty)::before { margin-right: .5em; } .divider:not(:empty)::after { margin-left: .5em; }

        .google-btn {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-bg);
            color: white; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; cursor: pointer; transition: all 0.3s;
        }
        .google-btn:hover { background: rgba(255,255,255,0.08); }

        /* --- CINEMATIC EXPLORE INTERFACE --- */
        .cinematic-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 500; opacity: 0; pointer-events: none; transition: opacity 1.5s ease;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .cinematic-overlay.active { opacity: 1; pointer-events: auto; }

        .cine-gradient {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: radial-gradient(circle at 30% 30%, rgba(124, 58, 237, 0.12), transparent 40%),
                        radial-gradient(circle at 70% 80%, rgba(6, 182, 212, 0.12), transparent 45%);
            z-index: 1; animation: ambientMove 25s infinite alternate ease-in-out;
            transform: scale(1); transition: transform 20s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cinematic-overlay.active .cine-gradient { animation: ambientMove 25s infinite alternate ease-in-out, cinematicZoom 45s forwards linear; }

        @keyframes ambientMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(8%, 10%) rotate(10deg); }
        }
        @keyframes cinematicZoom { to { transform: scale(1.15) translate(4%, 5%); } }

        .abstract-shape {
            position: absolute; background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(8px); border-radius: 24px; pointer-events: none; z-index: 2;
            animation: floatShape 20s infinite alternate ease-in-out;
        }
        .shape-1 { width: 220px; height: 340px; top: 15%; left: -5%; transform: rotate(15deg); }
        .shape-2 { width: 300px; height: 200px; bottom: 10%; right: -8%; transform: rotate(-20deg); animation-duration: 25s; }

        @keyframes floatShape {
            0% { transform: translateY(0) rotate(var(--r, 15deg)) translateX(0); }
            100% { transform: translateY(-30px) rotate(calc(var(--r, 15deg) + 5deg)) translateX(15px); }
        }

        #particleCanvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 2; pointer-events: none; opacity: 0.6; }

        .quote-wrapper { position: relative; max-width: 800px; width: 90%; text-align: center; z-index: 10; padding: 0 20px; }
        .quote-text {
            font-family: 'Inter', sans-serif; font-weight: 300; font-size: 2.2rem; line-height: 1.5;
            color: rgba(255, 255, 255, 0.95); margin-bottom: 25px; min-height: 120px; letter-spacing: -0.5px;
            text-shadow: 0 0 40px rgba(255,255,255,0.1);
        }
        .quote-author { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.3rem; color: rgba(255, 255, 255, 0.5); opacity: 0; transition: opacity 0.8s ease; }
        .quote-author.visible { opacity: 1; }

        .cursor-blink::after { content: '|'; animation: blink 0.8s infinite; color: var(--cyan-accent); font-weight: bold; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- 🔒 ULTIMATE GLITCH FIX CORE STYLING --- */
        .profile-card-grand {
            background: rgba(255, 255, 255, 0.01); border: 1px solid var(--glass-border);
            padding: 45px 60px; border-radius: 28px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.7); text-align: center; 
            opacity: 0; transform: scale(0.95); transition: opacity 0.8s ease, transform 0.8s ease; 
            position: absolute; display: none !important; pointer-events: none !important; z-index: -10 !important;
        }
        .profile-card-grand.visible { 
            display: block !important; 
            opacity: 1 !important; 
            transform: scale(1) !important; 
            pointer-events: auto !important; 
            z-index: 600 !important; 
        }
        .profile-card-grand h4 { font-size: 13px; font-weight: 400; letter-spacing: 6px; color: rgba(255,255,255,0.4); margin-bottom: 15px; }
        .profile-card-grand h3 { font-family: 'Poppins', sans-serif; font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, rgba(255,255,255,0.6)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; letter-spacing: -1px; }
        
        .insta-handle-link {
            display: inline-flex; align-items: center; gap: 10px; padding: 12px 28px; border-radius: 50px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            color: #fff; font-size: 16px; font-weight: 500; text-decoration: none; transition: all 0.4s ease;
        }
        .insta-handle-link i { color: rgba(255,255,255,0.6); transition: color 0.4s; }
        .insta-handle-link:hover {
            border-color: var(--insta-neon); box-shadow: 0 0 30px rgba(225, 48, 108, 0.4);
            background: rgba(225, 48, 108, 0.05); transform: translateY(-3px);
        }
        .insta-handle-link:hover i { color: var(--insta-neon); text-shadow: 0 0 15px var(--insta-neon); }

        .cine-controls { position: absolute; top: 30px; right: 5%; z-index: 700; display: flex; gap: 15px; align-items: center; }
        .cine-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: rgba(255,255,255,0.6);
            width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s; font-size: 18px;
        }
        .cine-btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.05); }
    </style>
</head>
<body>
        <div class="spotlight" id="spotlight"></div>
    <div class="noise-bg"></div>
    <div class="blob blob-purple"></div>
    <div class="blob blob-cyan"></div>

    <nav>

    <main class="hero-section" id="hero">

        <div class="btn-container" id="heroBtnContainer">

            <button class="btn btn-photos" onclick="showPhotos()">
                <i class="ph ph-image" style="font-size: 20px;"></i> Photos
            </button>
        </div>
    </main>

    <section class="photos-section" id="photos">
        <button class="back-btn" onclick="showHome()">
            <i class="ph ph-arrow-left"></i> Back to Home
        </button>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=800&auto=format&fit=crop"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=800&auto=format&fit=crop"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1604871000636-074fa5117945?q=80&w=800&auto=format&fit=crop"></div>
        </div>
    </section>

    <div class="cinematic-overlay" id="cineOverlay">
        <div class="cine-gradient"></div>
        <div class="abstract-shape shape-1"></div>
        <div class="abstract-shape shape-2" style="--r:-20deg;"></div>
        
        <canvas id="particleCanvas"></canvas>

        <div class="cine-controls">
            <button class="cine-btn" id="audioToggleBtn" title="Toggle Ambient Music">
                <i class="ph ph-speaker-slash" id="audioIcon"></i>
            </button>
            
            <button class="cine-btn" onclick="skipToGrandFinale()" title="Skip Quotes" style="font-size: 13px; font-family: 'Inter', sans-serif; width: auto; padding: 0 18px; border-radius: 20px; font-weight: 500; color: #fff; background: rgba(255,255,255,0.06);">
                Skip
            </button>
            
            <button class="cine-btn" onclick="closeCinematicMode()" title="Exit Presentation">

        <div class="quote-wrapper" id="quoteWrapper">
            <div class="quote-text cursor-blink" id="targetQuote"></div>
            <div class="quote-author" id="targetAuthor"></div>
        </div>

        <div class="profile-card-grand" id="grandProfileCard">
            <h4>CREATED BY</h4>
            <h3>SHAILESH PRAJAPATI</h3>
            <a href="https://instagram.com/shailesh_14_" target="_blank" class="insta-handle-link">
                <i class="ph ph-instagram-logo" style="font-size: 22px;"></i> @shailesh_14_
            </a>
        </div>
    </div>

    <div class="modal-overlay" id="authModal" onclick="closeModal(event)">
        <div class="auth-card" onclick="event.stopPropagation()">
            <button class="close-modal" id="closeModalBtn">
                <i class="ph ph-x"></i>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <audio id="ambientMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            updateProfile, 
            signInWithPopup, 
            GoogleAuthProvider, 
            signOut, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCJ75TKwCbpR-7Z0PUue-q1_NjgTaJ7Zro",
          authDomain: "my-website-c5665.firebaseapp.com",
          projectId: "my-website-c5665",
          storageBucket: "my-website-c5665.firebasestorage.app",
          messagingSenderId: "729016953744",
          appId: "1:729016953744:web:5b93b0bc3541c4d9102115"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const modal = document.getElementById('authModal');
        const modalContent = document.getElementById('modalContent');
        const navAuthLinks = document.getElementById('navAuthLinks');
        const heroBtnContainer = document.getElementById('heroBtnContainer');
        const closeModalBtn = document.getElementById('closeModalBtn');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const displayName = user.displayName || "User";
                navAuthLinks.innerHTML = `
                    <span class="user-greet">Hi, ${displayName}</span>
                    <button class="logout-btn" id="logoutAction">Logout</button>
                `;
                heroBtnContainer.innerHTML = `
                    <button class="btn btn-photos" onclick="showPhotos()">
                        <i class="ph ph-image" style="font-size: 20px;"></i> Photos
                    </button>
                `;
                document.getElementById('logoutAction')?.addEventListener('click', () => signOut(auth));
            } else {
                navAuthLinks.innerHTML = `
                    <button id="navLoginBtn">Login</button>
                    <button id="navSignupBtn">Sign Up</button>
                `;
                heroBtnContainer.innerHTML = `
                    <button class="btn btn-explore" onclick="startCinematicMode()">Explore</button>
                    <button class="btn btn-login" id="heroLoginBtn">Login</button>
                    <button class="btn btn-signup" id="heroSignupBtn">Sign Up</button>
                    <button class="btn btn-photos" onclick="showPhotos()">
                        <i class="ph ph-image" style="font-size: 20px;"></i> Photos
                    </button>
                `;
                
                document.getElementById('navLoginBtn')?.addEventListener('click', () => openModal('login'));
                document.getElementById('navSignupBtn')?.addEventListener('click', () => openModal('signup'));
                document.getElementById('heroLoginBtn')?.addEventListener('click', () => openModal('login'));
                document.getElementById('heroSignupBtn')?.addEventListener('click', () => openModal('signup'));
            }
        });

        window.openModal = function(type) {
            if(type === 'login') {
                modalContent.innerHTML = `
                    <h3>Welcome Back</h3>
                    <p>Enter your details to access your account.</p>
                    <div class="input-group"><input type="email" id="loginEmail" placeholder="Email Address" required></div>
                    <div class="input-group"><input type="password" id="loginPassword" placeholder="Password" required></div>
                    <button class="auth-submit" id="loginSubmitBtn">Sign In</button>
                    <div class="divider">or</div>
                    <button class="google-btn" id="googleAuthBtn"><i class="ph ph-google-logo" style="font-size:18px;"></i> Continue with Google</button>
                `;
                document.getElementById('loginSubmitBtn').addEventListener('click', handleEmailLogin);
            } else {
                modalContent.innerHTML = `
                    <h3>Create Account</h3>
                    <p>Get started with your premium profile today.</p>
                    <div class="input-group"><input type="text" id="signName" placeholder="Full Name" required></div>
                    <div class="input-group"><input type="email" id="signEmail" placeholder="Email Address" required></div>
                    <div class="input-group"><input type="password" id="signPassword" placeholder="Password" required></div>
                    <button class="auth-submit" id="signupSubmitBtn" style="background: linear-gradient(135deg, var(--purple-glow), var(--cyan-accent)); color: white;">Create Account</button>
                    <div class="divider">or</div>
                    <button class="google-btn" id="googleAuthBtn"><i class="ph ph-google-logo" style="font-size:18px;"></i> Sign up with Google</button>
                `;
                document.getElementById('signupSubmitBtn').addEventListener('click', handleEmailSignup);
            }
            document.getElementById('googleAuthBtn').addEventListener('click', handleGoogleAuth);
            modal.classList.add('active');
        }

        async function handleEmailSignup() {
            const name = document.getElementById('signName').value;
            const email = document.getElementById('signEmail').value;
            const password = document.getElementById('signPassword').value;
            if(!name || !email || !password) { alert("Please fill all fields!"); return; }
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                modal.classList.remove('active');
            } catch (error) { alert("Signup Error: " + error.message); }
        }

        async function handleEmailLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if(!email || !password) { alert("Please fill all fields!"); return; }
            try { await signInWithEmailAndPassword(auth, email, password); modal.classList.remove('active'); } catch (error) { alert("Login Error: " + error.message); }
        }

        async function handleGoogleAuth() {
            try { await signInWithPopup(auth, googleProvider); modal.classList.remove('active'); } catch (error) { alert("Google Auth Error: " + error.message); }
        }

        closeModalBtn.addEventListener('click', () => modal.classList.remove('active'));
    </script>

    <script>
        const spotlight = document.getElementById('spotlight');
        document.addEventListener('mousemove', (e) => {
            spotlight.style.setProperty('--x', e.clientX + 'px');
            spotlight.style.setProperty('--y', e.clientY + 'px');
        });

        const hero = document.getElementById('hero');
        const photos = document.getElementById('photos');
        window.showPhotos = function() { hero.style.display = 'none'; photos.style.display = 'block'; window.scrollTo({ top: 0 }); }
        window.showHome = function() { photos.style.display = 'none'; hero.style.display = 'flex'; }
        window.closeModal = function(e) { if(e.target === document.getElementById('authModal')) authModal.classList.remove('active'); }

        /* --- CINEMATIC QUOTES ENGINE GENERATOR --- */
        const quotesList = [
            { text: "The only place where success comes before work is in the dictionary.", author: "Vidal Sassoon" },
            { text: "You don’t have to see the whole staircase, just take the first step.", author: "Martin Luther King Jr." },
            { text: "Success is how high you bounce when you hit bottom.", author: "George S. Patton" },
            { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
            { text: "It always seems impossible until it’s done.", author: "Nelson Mandela" },
            { text: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
            { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
            { text: "Action breeds confidence and courage. If you want to conquer fear, do not sit at home and think about it.", author: "Dale Carnegie" },
            { text: "We become what we think about.", author: "Earl Nightingale" },
            { text: "Whatever the mind of man can conceive and believe, it can achieve.", author: "Napoleon Hill" }
        ];

        let currentQuoteIndex = 0;
        let typewriterTimeout;
        const cineOverlay = document.getElementById('cineOverlay');
        const targetQuote = document.getElementById('targetQuote');
        const targetAuthor = document.getElementById('targetAuthor');
        const grandProfileCard = document.getElementById('grandProfileCard');
        const quoteWrapper = document.getElementById('quoteWrapper');
        
        const audio = document.getElementById('ambientMusic');
        const audioToggleBtn = document.getElementById('audioToggleBtn');
        const audioIcon = document.getElementById('audioIcon');
        let isMusicPlaying = false;

        audioToggleBtn.addEventListener('click', () => {
            if (isMusicPlaying) {
                audio.pause();
                audioIcon.className = "ph ph-speaker-slash";
            } else {
                audio.play().catch(e => console.log("Audio playing issue handled"));
                audioIcon.className = "ph ph-speaker-high";
            }
            isMusicPlaying = !isMusicPlaying;
        });

        window.startCinematicMode = function() {
            hero.style.transform = "scale(0.95)";
            hero.style.opacity = "0";
            
            setTimeout(() => {
                cineOverlay.classList.add('active');
                currentQuoteIndex = 0;
                grandProfileCard.className = "profile-card-grand"; // Reset styles completely
                quoteWrapper.style.display = "block";
                quoteWrapper.style.opacity = "1";
                startParticleEngine();
                if(isMusicPlaying) audio.play();
                setTimeout(renderNextQuote, 800);
            }, 400);
        }

        // GLITCH FIX LAYER 2: Ensure Instagram Card is brutally blocked on exit
        window.closeCinematicMode = function() {
            cineOverlay.classList.remove('active');
            grandProfileCard.className = "profile-card-grand"; 
            hero.style.transform = "scale(1)";
            hero.style.opacity = "1";
            clearTimeout(typewriterTimeout);
            audio.pause();
            isMusicPlaying = false;
            audioIcon.className = "ph ph-speaker-slash";
            stopParticleEngine();
        }

        // GLITCH FIX LAYER 3: Handle card render states seamlessly upon clicking Skip
        window.skipToGrandFinale = function() {
            clearTimeout(typewriterTimeout);
            smoothDissolveQuote(() => {
                quoteWrapper.style.display = "none";
                grandProfileCard.classList.add('visible');
            });
        }

        function renderNextQuote() {
            if (currentQuoteIndex >= quotesList.length) {
                smoothDissolveQuote(() => {
                    quoteWrapper.style.display = "none";
                    grandProfileCard.classList.add('visible');
                });
                return;
            }

            const currentQuote = quotesList[currentQuoteIndex];
            targetAuthor.classList.remove('visible');
            targetQuote.classList.add('cursor-blink');
            
            let charIndex = 0;
            targetQuote.textContent = "";

            function typeLetter() {
                if (charIndex < currentQuote.text.length) {
                    targetQuote.textContent += currentQuote.text.charAt(charIndex);
                    charIndex++;
                    typewriterTimeout = setTimeout(typeLetter, 45);
                } else {
                    targetQuote.classList.remove('cursor-blink');
                    targetAuthor.textContent = `— ${currentQuote.author}`;
                    targetAuthor.classList.add('visible');

                    currentQuoteIndex++;
                    typewriterTimeout = setTimeout(() => {
                        smoothDissolveQuote(() => {
                            setTimeout(renderNextQuote, 600);
                        });
                    }, 4000);
                }
            }
            typeLetter();
        }

        function smoothDissolveQuote(callback) {
            targetQuote.style.transition = "opacity 0.8s ease, transform 0.8s ease";
            targetAuthor.style.transition = "opacity 0.8s ease";
            targetQuote.style.opacity = "0";
            targetQuote.style.transform = "translateY(-5px)";
            targetAuthor.style.opacity = "0";

            setTimeout(() => {
                targetQuote.textContent = "";
                targetAuthor.textContent = "";
                targetQuote.style.opacity = "1";
                targetQuote.style.transform = "translateY(0)";
                targetQuote.style.transition = "none";
                targetAuthor.style.transition = "opacity 0.8s ease";
                callback();
            }, 800);
        }

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let particlesArray = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * -0.4 - 0.1;
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; }
                if (this.x < 0 || this.x > canvas.width) { this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#06B6D4';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function startParticleEngine() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            particlesArray = [];
            for (let i = 0; i < 65; i++) { particlesArray.push(new Particle()); }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                    particlesArray[i].draw();
                }
                animationFrameId = requestAnimationFrame(animate);
            }
            animate();
        }

        function stopParticleEngine() {
            cancelAnimationFrame(animationFrameId);
            window.removeEventListener('resize', resizeCanvas);
        }
    </script>
</body>
</html>
